name: staging-preview

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: Full reviewed commit SHA to deploy
        required: true
        type: string
      pull_request:
        description: PR number to receive the preview comment
        required: true
        type: number

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: digitalocean-staging
  cancel-in-progress: false

jobs:
  deploy:
    environment: staging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.commit_sha }}

      - name: Require an exact repository commit
        env:
          COMMIT_SHA: ${{ inputs.commit_sha }}
        run: |
          test "$(printf '%s' "$COMMIT_SHA" | wc -c)" -eq 40
          test "$(git rev-parse HEAD)" = "$COMMIT_SHA"

      - name: Configure staging SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DO_STAGING_SSH_KEY }}
          STAGING_HOST: ${{ secrets.DO_STAGING_HOST }}
        run: |
          install -d -m 0700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 0600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$STAGING_HOST" >> ~/.ssh/known_hosts

      - name: Deploy exact SHA and prove the critical path
        env:
          COMMIT_SHA: ${{ inputs.commit_sha }}
          STAGING_HOST: ${{ secrets.DO_STAGING_HOST }}
          STUDIO_BEARER_TOKEN: ${{ secrets.DO_STAGING_BEARER_TOKEN }}
        run: scripts/single-host-release.sh "root@$STAGING_HOST" "$COMMIT_SHA"

      - name: Comment preview URL
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ inputs.pull_request }}
          STAGING_HOST: ${{ secrets.DO_STAGING_HOST }}
          COMMIT_SHA: ${{ inputs.commit_sha }}
        run: |
          gh pr comment "$PR" --body "DigitalOcean staging preview: http://$STAGING_HOST:3000 — deployed exact SHA \`$COMMIT_SHA\`. The synthetic create → gate → fix → publish → export proof passed. Synthetic data only; access is restricted by the DigitalOcean firewall."
