name: staging-preview

on:
  workflow_dispatch:
    inputs:
      pull_request:
        description: Open PR to deploy and receive the preview comment
        required: true
        type: number

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: digitalocean-staging
  cancel-in-progress: false

jobs:
  deploy:
    environment: staging
    runs-on: ubuntu-latest
    steps:
      - name: Resolve the current PR head
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ inputs.pull_request }}
        run: |
          state=$(gh pr view "$PR" --repo "$GITHUB_REPOSITORY" --json state --jq .state)
          test "$state" = OPEN
          sha=$(gh pr view "$PR" --repo "$GITHUB_REPOSITORY" --json headRefOid --jq .headRefOid)
          test "$(printf '%s' "$sha" | wc -c)" -eq 40
          printf 'sha=%s\n' "$sha" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.sha }}

      - name: Require an exact repository commit
        env:
          COMMIT_SHA: ${{ steps.pr.outputs.sha }}
        run: |
          test "$(printf '%s' "$COMMIT_SHA" | wc -c)" -eq 40
          test "$(git rev-parse HEAD)" = "$COMMIT_SHA"

      - name: Configure SSH to the staging droplet
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DO_STAGING_SSH_KEY }}
          STAGING_KNOWN_HOSTS: ${{ secrets.DO_STAGING_KNOWN_HOSTS }}
          STAGING_SSH_HOST: ${{ secrets.DO_STAGING_HOST }}
        run: |
          test -n "$STAGING_SSH_HOST"
          install -d -m 0700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 0600 ~/.ssh/id_ed25519
          printf '%s\n' "$STAGING_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 0600 ~/.ssh/known_hosts
          ssh-keygen -F "$STAGING_SSH_HOST" -f ~/.ssh/known_hosts >/dev/null
          cat >> ~/.ssh/config <<EOF
          Host $STAGING_SSH_HOST
            User root
            IdentityFile ~/.ssh/id_ed25519
            IdentitiesOnly yes
          EOF
          chmod 0600 ~/.ssh/config
          ssh -o BatchMode=yes "$STAGING_SSH_HOST" true

      - name: Install versioned DigitalOcean agent routing
        env:
          STAGING_SSH_HOST: ${{ secrets.DO_STAGING_HOST }}
          DIGITALOCEAN_PLANNER_ENDPOINT: ${{ vars.DIGITALOCEAN_PLANNER_ENDPOINT }}
          DIGITALOCEAN_PLANNER_ACCESS_KEY: ${{ secrets.DIGITALOCEAN_PLANNER_ACCESS_KEY }}
          DIGITALOCEAN_PLANNER_VERSION: ${{ vars.DIGITALOCEAN_PLANNER_VERSION }}
          DIGITALOCEAN_GENERATOR_ENDPOINT: ${{ vars.DIGITALOCEAN_GENERATOR_ENDPOINT }}
          DIGITALOCEAN_GENERATOR_ACCESS_KEY: ${{ secrets.DIGITALOCEAN_GENERATOR_ACCESS_KEY }}
          DIGITALOCEAN_GENERATOR_VERSION: ${{ vars.DIGITALOCEAN_GENERATOR_VERSION }}
        run: scripts/single-host-configure-agent.sh "$STAGING_SSH_HOST"

      - name: Deploy exact SHA and prove the critical path
        env:
          COMMIT_SHA: ${{ steps.pr.outputs.sha }}
          STAGING_SSH_HOST: ${{ secrets.DO_STAGING_HOST }}
          STUDIO_BEARER_TOKEN: ${{ secrets.DO_STAGING_BEARER_TOKEN }}
          STAGING_BASE_URL: ${{ vars.DO_STAGING_URL }}
          REQUIRE_DIGITALOCEAN_PLANNER: "1"
          EXPECTED_PLANNER_VERSION: ${{ vars.DIGITALOCEAN_PLANNER_VERSION }}
          REQUIRE_DIGITALOCEAN_GENERATOR: ${{ vars.DIGITALOCEAN_GENERATOR_REQUIRED || '0' }}
        run: scripts/single-host-release.sh "$STAGING_SSH_HOST" "$COMMIT_SHA"

      - name: Comment preview URL
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ inputs.pull_request }}
          STAGING_URL: ${{ vars.DO_STAGING_URL }}
          COMMIT_SHA: ${{ steps.pr.outputs.sha }}
        run: |
          gh pr comment "$PR" --body "DigitalOcean staging preview: $STAGING_URL. Deployed exact SHA \`$COMMIT_SHA\`. The synthetic create, gate, fix, publish, and export proof passed. Synthetic data only."
