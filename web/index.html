<style>
/* Sketchy wireframe kit, carried over from the design export so the running
   app and the storyboards read as the same object. */
*{box-sizing:border-box}
body{margin:0;background:#f0eee9;font-family:'Shantell Sans',system-ui,sans-serif;color:#2b2b2b;font-size:14px}
a{color:#2a78d6}
header{display:flex;align-items:center;gap:14px;padding:12px 20px;border-bottom:1px solid rgba(0,0,0,.08)}

.skins{display:flex;gap:6px}

.skins button.on{background:#2a78d6;color:#fff}
main{max-width:1080px;margin:22px auto;padding:0 20px}
.scr{background:#fdfdfb;border:1.6px solid #2b2b2b;border-radius:255px 10px 225px 10px/10px 225px 10px 255px;display:flex;flex-direction:column;overflow:hidden;font-family:'Patrick Hand',cursive;font-size:15px;line-height:1.35}
.bar{display:flex;align-items:center;gap:8px;border-bottom:1.4px solid #2b2b2b;padding:7px 12px;flex:none;font-family:'Shantell Sans',sans-serif;font-size:13px}
.dot{width:8px;height:8px;border:1.4px solid #2b2b2b;border-radius:50%}
.sk{border:1.4px solid #2b2b2b;border-radius:225px 6px 255px 6px/6px 255px 6px 225px;background:#fff}
.ln{height:7px;background:#d7d4cc;border-radius:3px}
.b{display:inline-flex;align-items:center;justify-content:center;gap:5px;border:1.4px solid #2b2b2b;border-radius:6px;padding:4px 11px;background:#fff;font-family:'Patrick Hand',cursive;font-size:14px;cursor:pointer}
.b:disabled,.b.locked{opacity:.4;cursor:not-allowed}
.bp{background:#2a78d6;color:#fff;border-color:#1c5aa8}
.chip{display:inline-flex;align-items:center;border:1.3px dashed #666;border-radius:10px;padding:2px 10px;font-size:13px;background:#fff;cursor:pointer;font-family:'Patrick Hand',cursive}

.ty{background:#faeedd;color:#8a5a14;border:1px solid #d98a2b}
.tb{background:#e3edfa;color:#1c5aa8;border:1px solid #2a78d6}
.note{font-family:'Patrick Hand',cursive;font-size:13px;color:#8a5a14}
.muted{color:#888;font-size:12px;font-family:'Shantell Sans',sans-serif}
textarea,input[type=text]{font-family:'Patrick Hand',cursive;font-size:15px;border:1.4px solid #2b2b2b;border-radius:225px 6px 255px 6px/6px 255px 6px 225px;background:#fff;padding:8px 11px;width:100%;resize:vertical}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.col{display:flex;flex-direction:column;gap:8px}
.split{display:flex;min-height:430px}
.split>.left{width:42%;border-right:1.4px solid #2b2b2b;padding:12px;display:flex;flex-direction:column;gap:8px}
.split>.right{flex:1;padding:14px;display:flex;flex-direction:column;gap:9px;position:relative}
.rail{display:flex;gap:2px;font-size:11px;font-family:'Shantell Sans',sans-serif;justify-content:space-between;flex:1}

.drawer{border-top:1.4px solid #2b2b2b;background:#f4f2ec;padding:9px 14px;font-size:13px;display:flex;flex-direction:column;gap:4px;font-family:'Patrick Hand',cursive}

.msg{padding:5px 9px}
.msg.dr{background:#eef3fb}
.feature{padding:7px 10px}
.applist button{width:100%;text-align:left;margin-bottom:6px}
.arch{display:flex;flex-direction:column;gap:10px;font-family:'Patrick Hand',cursive;padding:20px}

.arch .mid{text-align:center;color:#888}
footer{max-width:1080px;margin:10px auto 40px;padding:0 20px;color:#999;font-size:11.5px}

/* Project-owned warm clinician theme. The supplied component kit is not
   vendored; semantic tokens keep the studio and exported apps legible. */
:root{--ink:#2c2528;--muted:#75696d;--line:#e7dadd;--panel:#fffdfc;--canvas:#fbf6f3;--brand:#9f3d5f;--brand-dark:#762844;--focus:#d76b8e;--success:#287052;--success-bg:#edf7f1;--warn:#8b571e;--warn-bg:#fff5df;--danger:#a43c3c;--danger-bg:#fff0ee;--radius-control:12px;--radius-card:18px;--radius-dialog:24px}
body{background:var(--canvas);font-family:ui-rounded,"Nunito Sans",ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--ink);font-size:14px}
a{color:var(--brand)}
header{position:sticky;top:0;z-index:30;min-height:68px;padding:0 28px;background:rgba(255,253,252,.96);border-bottom:1px solid var(--line);box-shadow:0 1px 2px rgba(70,35,46,.05);backdrop-filter:blur(12px)}
header h1{font-size:15px;font-weight:700;letter-spacing:-.01em;color:var(--ink)}

header .who{color:var(--muted);font-size:12px}
.skins{padding:4px;border:1px solid var(--line);border-radius:10px;background:#f1f5f9}
.skins button{font:600 12px ui-sans-serif,system-ui;padding:6px 10px;background:transparent;color:#475569;border-radius:7px}
.skins button.on{background:white;color:var(--brand-dark);box-shadow:0 1px 3px rgba(15,23,42,.12)}
main{max-width:1280px;margin:32px auto;padding:0 28px}
.scr{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius-card);overflow:hidden;font-family:inherit;font-size:14px;line-height:1.5;box-shadow:0 14px 36px rgba(70,35,46,.08)}
.bar{min-height:52px;padding:10px 16px;border-bottom:1px solid var(--line);background:#fff;font-family:inherit;font-size:13px}
.dot{width:8px;height:8px;border:0;background:#cbd5e1}
.sk{border:1px solid var(--line);border-radius:10px;background:#fff;box-shadow:0 1px 2px rgba(15,23,42,.03)}
.ln{background:#e2e8f0;border-radius:999px}
.b{min-height:44px;border:1px solid #d9c8cd;border-radius:var(--radius-control);padding:9px 14px;background:#fff;font-family:inherit;font-size:13px;font-weight:700;color:#4f4247;box-shadow:0 1px 2px rgba(70,35,46,.06);transition:.15s ease}
.b:hover:not(:disabled){border-color:#d794aa;color:var(--brand-dark);transform:translateY(-1px)}
.b:focus-visible,.chip:focus-visible,.pack-card:focus-visible{outline:3px solid color-mix(in srgb,var(--focus) 35%,transparent);outline-offset:2px}
.bp{background:var(--brand);color:#fff;border-color:var(--brand)}
.bp:hover:not(:disabled){background:var(--brand-dark);color:#fff}
.chip{border:1px solid var(--line);border-radius:999px;padding:5px 11px;font-size:12px;background:#fff;font-family:inherit;color:#475569}
.chip.on{border-color:#d794aa;background:#fff0f4;color:var(--brand-dark);box-shadow:0 0 0 2px #f7dce5}
.tag{border-radius:999px;padding:3px 8px;font-size:11px;font-family:inherit;font-weight:700;letter-spacing:.02em}
.tg{background:var(--success-bg);color:var(--success);border:1px solid #a7f3d0}
.ty{background:var(--warn-bg);color:var(--warn);border:1px solid #fde68a}
.tb{background:#fff0f4;color:var(--brand-dark);border:1px solid #efc4d2}
.note{font-family:inherit;font-size:12px;color:var(--warn)}
.muted{color:var(--muted);font-size:12px;font-family:inherit}
textarea,input[type=text]{min-height:44px;font-family:inherit;font-size:14px;border:1px solid #d9c8cd;border-radius:var(--radius-control);background:#fff;padding:10px 12px;box-shadow:0 1px 2px rgba(70,35,46,.04)}
textarea:focus,input:focus{outline:3px solid color-mix(in srgb,var(--focus) 30%,transparent);border-color:var(--focus)}
.split{min-height:520px}
.split>.left{border-right:1px solid var(--line);padding:18px;gap:10px;background:#fbfdff}

.msg{padding:8px 11px}
.msg.dr{background:#fff0f4;border-color:#efc4d2}
.feature{padding:10px 12px}
.arch{font-family:inherit;padding:28px;background:#f8fafc}

@media(max-width:800px){header{padding:10px 16px;flex-wrap:wrap}.who{width:100%;order:3}.skins{order:2;margin-left:auto;overflow:auto}main{margin:20px auto;padding:0 12px}.split{display:block}.split>.left{width:100%;border-right:0;border-bottom:1px solid var(--line)}.meter{width:100%;border-left:0;border-top:1px solid var(--line)}}

/* Generic catalogue/dashboard composition: independently authored stat
   cards, split workspaces, selectable cards, and compact callouts. */
.workspace-kicker{font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--brand)}

.summary-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin:20px 0}
.summary-card{padding:15px 16px;border:1px solid var(--line);border-radius:12px;background:#fff;box-shadow:0 1px 2px rgba(15,23,42,.04)}
.summary-card strong{display:block;margin-top:4px;font-size:21px;letter-spacing:-.025em}
.summary-card span{color:var(--muted);font-size:12px}
.builder-grid{display:grid;grid-template-columns:minmax(0,1.45fr) minmax(290px,.7fr);min-height:560px}

.pack-card{display:block;width:100%;padding:12px;text-align:left;border:1px solid var(--line);border-radius:10px;background:#fff;color:var(--ink);cursor:pointer;transition:.15s ease}
.pack-card:hover{border-color:#d794aa;box-shadow:0 3px 10px rgba(159,61,95,.09);transform:translateY(-1px)}
.pack-card.on{border-color:#c95d82;background:#fff0f4;box-shadow:0 0 0 2px #f7dce5}
.pack-card-top{display:flex;align-items:center;gap:8px}.pack-card-top b{font-size:13px}.pack-card-top .tag{margin-left:auto}
.pack-card p{margin:5px 0 0;color:var(--muted);font-size:11.5px;line-height:1.4}
.aside-icon{display:grid;place-items:center;width:44px;height:44px;border-radius:14px;background:#f7dce5;color:var(--brand-dark);font-size:20px}
.selected-title{margin:14px 0 5px;font-size:18px;letter-spacing:-.02em}
.selected-copy{margin:0;color:var(--muted);font-size:13px;line-height:1.55}
.profile-list{display:flex;flex-direction:column;gap:9px;margin:18px 0}
.profile-row{display:flex;gap:9px;align-items:flex-start;font-size:12px;color:#475569}.profile-row b{display:block;color:#1e293b}
.check-dot{display:grid;place-items:center;flex:none;width:20px;height:20px;border-radius:999px;background:#d1fae5;color:#047857;font-size:11px;font-weight:800}
.safety-callout{padding:12px;border:1px solid #e9c4a2;border-radius:var(--radius-control);background:var(--warn-bg);color:var(--warn);font-size:12px;line-height:1.5}
.primary-wide{width:100%;min-height:44px;margin-top:16px}
.existing-list{display:grid;gap:8px;margin-top:14px}.existing-list .b{justify-content:flex-start}.existing-list .tag{margin-left:auto}
button,.chip,header a{min-height:44px}header a{display:inline-flex;align-items:center}
@media(max-width:900px){.builder-grid{grid-template-columns:1fr}.builder-primary{border-right:0;border-bottom:1px solid var(--line)}.summary-grid{grid-template-columns:1fr}.pack-grid{grid-template-columns:1fr}}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{scroll-behavior:auto!important;transition-duration:.01ms!important;animation-duration:.01ms!important;animation-iteration-count:1!important}.b:hover:not(:disabled),.pack-card:hover{transform:none}}

/* Shakti flow: one calm path from an idea to an owned app. */
.flow-shell{display:grid;gap:22px}.flow-eyebrow{font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--brand)}
.flow-hero{max-width:700px;margin:54px auto 10px;text-align:center}.flow-hero h2{margin:8px 0 10px;font-size:clamp(30px,5vw,52px);line-height:1.04;letter-spacing:-.05em}.flow-hero p{max-width:600px;margin:auto;color:var(--muted);font-size:16px;line-height:1.65}
.prompt-card{max-width:760px;margin:auto;padding:22px;border:1px solid var(--line);border-radius:20px;background:var(--panel);box-shadow:0 18px 44px rgba(70,35,46,.1)}.prompt-card textarea{min-height:112px;border:0;box-shadow:none;font-size:18px;line-height:1.55;outline:0}.prompt-actions{display:flex;align-items:center;justify-content:space-between;gap:12px;padding-top:15px;border-top:1px solid var(--line)}
.quick-prompts{display:flex;justify-content:center;gap:8px;flex-wrap:wrap}.quick-prompts button{border:1px solid var(--line);border-radius:999px;background:#fff;padding:8px 12px;color:var(--muted);cursor:pointer}.starter-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:18px}.starter-grid .pack-card{min-height:102px}
.studio-shell{display:grid;grid-template-columns:minmax(300px,396px) minmax(0,1fr);min-height:690px;border:1px solid var(--line);border-radius:20px;overflow:hidden;background:var(--panel);box-shadow:0 18px 44px rgba(70,35,46,.1)}.conversation{display:flex;flex-direction:column;padding:22px;border-right:1px solid var(--line);background:#fffaf8}.conversation-log{display:flex;flex-direction:column;gap:10px;overflow:auto}.bubble{max-width:92%;padding:10px 12px;border-radius:14px;background:#fff;border:1px solid var(--line);font-size:13px}.bubble.user{align-self:flex-end;background:#fff0f4;border-color:#efc4d2}.conversation-compose{display:flex;gap:8px;margin-top:auto;padding-top:18px}.preview-pane{display:flex;flex-direction:column;min-width:0;background:#f7f3f1}.preview-bar{display:flex;align-items:center;gap:8px;padding:13px 16px;border-bottom:1px solid var(--line);background:#fff}.preview-surface{display:grid;place-items:center;flex:1;padding:28px}.preview-app{width:min(520px,100%);padding:26px;border:1px solid var(--line);border-radius:20px;background:#fff;box-shadow:0 16px 36px rgba(70,35,46,.1)}.preview-features{display:grid;gap:9px;margin-top:20px}.preview-feature{padding:12px;border:1px solid var(--line);border-radius:12px;background:#fffdfc}.studio-footer{display:flex;align-items:center;gap:10px;padding:12px 16px;border-top:1px solid var(--line);background:#fff}
.gate-backdrop{position:fixed;inset:0;z-index:60;display:grid;place-items:center;padding:20px;background:rgba(44,37,40,.48);backdrop-filter:blur(5px)}.gate-card{width:min(620px,100%);max-height:90vh;overflow:auto;padding:26px;border-radius:24px;background:#fff;box-shadow:0 28px 80px rgba(44,37,40,.3)}.gate-list{display:grid;gap:9px;margin:20px 0}.gate-item{display:grid;grid-template-columns:26px 1fr auto;gap:10px;align-items:start;padding:12px;border:1px solid var(--line);border-radius:14px}.gate-item.pass{background:var(--success-bg)}.gate-item.fail{background:var(--warn-bg)}
.live-shell{display:grid;gap:18px}.live-hero{padding:28px;border:1px solid #ead49a;border-radius:20px;background:linear-gradient(135deg,#fff9e9,#fffdfc);box-shadow:0 18px 44px rgba(70,35,46,.08)}.live-grid{display:grid;grid-template-columns:1.2fr .8fr;gap:14px}.live-card{padding:20px;border:1px solid var(--line);border-radius:16px;background:#fff}.audit-list{display:grid;gap:7px}.auth-inline{margin-left:auto}
.ownership-gate{max-width:620px;margin:6vh auto;padding:30px;border:1px solid var(--line);border-radius:var(--radius-dialog);background:var(--panel);box-shadow:0 24px 64px rgba(70,35,46,.16)}.ownership-mark{display:grid;place-items:center;width:48px;height:48px;border-radius:16px;background:#f7dce5;color:var(--brand-dark);font-size:22px}.ownership-gate h2{margin:14px 0 8px;font-size:30px;line-height:1.15;letter-spacing:-.035em}.ownership-boundary{display:grid;gap:8px;margin:18px 0;padding:14px;border:1px solid var(--line);border-radius:14px;background:#fffaf8}.ownership-boundary div{display:flex;gap:9px;align-items:flex-start}.ownership-boundary b{color:var(--success)}#clerk-sign-in{min-height:52px}
.treatment-shell{max-width:1040px;margin:auto}.treatment-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin:20px 0}.treatment-card{position:relative;display:grid;gap:12px;padding:20px;border:1px solid var(--line);border-radius:18px;background:#fff;cursor:pointer;text-align:left}.treatment-card:has(input:checked){border-color:var(--brand);box-shadow:0 0 0 3px #f7dce5}.treatment-card input{position:absolute;top:18px;right:18px}.treatment-card h3{margin:0;padding-right:28px}.treatment-card ul{margin:0;padding-left:18px;color:var(--muted)}.treatment-card li+li{margin-top:5px}.review-shell{display:grid;grid-template-columns:minmax(0,1.15fr) minmax(340px,.85fr);gap:14px}.review-panel{padding:22px;border:1px solid var(--line);border-radius:18px;background:#fff}.verification-list{display:grid;gap:8px;margin:16px 0}.verification-row{padding:10px;border:1px solid var(--line);border-radius:10px}.diff-view{max-height:420px;overflow:auto;padding:14px;border-radius:12px;background:#201a1c;color:#f8e9ee;font:12px/1.55 ui-monospace,SFMono-Regular,Menlo,monospace;white-space:pre-wrap}.checkpoint-badge{display:inline-flex;padding:5px 9px;border-radius:999px;background:var(--success-bg);color:var(--success);font-weight:800;font-size:11px}
.refinement-card{display:grid;gap:16px;margin:0 0 20px;padding:22px;border:1px solid var(--brand);border-radius:18px;background:#fff8fa}.refinement-card h3{margin:0}.refinement-options{display:grid;grid-template-columns:1fr 1fr;gap:10px}.refinement-options label{display:grid;grid-template-columns:auto 1fr;gap:4px 10px;padding:14px;border:1px solid var(--line);border-radius:13px;background:#fff;cursor:pointer}.refinement-options input{grid-row:1/3}.refinement-options span{color:var(--muted);font-size:13px}.refinement-card textarea{width:100%;resize:vertical}
@media(max-width:820px){.studio-shell{grid-template-columns:1fr}.conversation{min-height:440px;border-right:0;border-bottom:1px solid var(--line)}.starter-grid,.live-grid{grid-template-columns:1fr}.flow-hero{margin-top:24px}.prompt-actions{align-items:stretch;flex-direction:column}.prompt-actions .b{width:100%}}
@media(max-width:820px){.treatment-grid,.review-shell,.refinement-options{grid-template-columns:1fr}}

</head>
<body>
<header>
  <h1>Practice Studio</h1>
  <nav class="skins" id="skins"></nav>
  <span class="who"><strong>Dr. Osei</strong> · Meridian Family Practice · <a href="/api/audit/export">Audit &amp; exports</a> <span id="clerk-user"></span></span>
</header>
<main id="main"></main>
<footer>Practice Studio learning environment · synthetic data only · every build, gate decision, and release is recorded.</footer>

<script>
"use strict";
// One state machine, three skins. The skins change chrome and ritual, never
// capability: all of them drive the same control-plane API.
const SKINS = {a:"Builder", b:"Release path", c:"Clinical view", d:"Architecture"};
const S = {
  skin: "a",
  packs: [],
  packSel: null,
  prompt: "",
  apps: [],
  appId: null,
  app: null,
  gate: null,          // {report, meter, reviewer_note}
  audit: [],
  operate: null,
  scaffold: [],        // animated generate steps
  generating: false,
  modal: null,         // "preflight" | "cosign" | null
  drawer: false,
  stage: "describe",   // 1b rail position
  review: null,        // reviewer note + report after /review
  err: null,
  token: sessionStorage.getItem("studio-token") || "",
  authMode: "static",
  clerkReady: false,
  authRequired: false,
  owned: false,
  sourceWorkspace: null,
  selectedTreatmentId: null,
  treatmentRefinement: {presentation:"task-first", emphasis:""},
  pendingTask: "",
};

const $ = sel => document.querySelector(sel);
const esc = s => String(s ?? "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

async function startWorkspace() {
  const response = await fetch("/api/public/session", {
    method: "POST",
    headers: {"content-type":"application/json"},
    body: "{}",
  });
  if (!response.ok) throw new Error("Could not start a private synthetic workspace");
}

async function api(path, opts, owner = false, retried = false) {
  const headers = {};
  if (opts) headers["content-type"] = "application/json";
  if (owner && S.authMode === "clerk" && window.Clerk?.session) {
    S.token = await Clerk.session.getToken();
  }
  if (owner && S.token) headers.authorization = `Bearer ${S.token}`;
  const r = await fetch(path, {method: opts ? "POST" : "GET", headers, ...(opts ? {body:JSON.stringify(opts)} : {})});
  const body = await r.json().catch(() => ({}));
  if (r.status === 401 && !owner && !retried) {
    await startWorkspace();
    return api(path, opts, owner, true);
  }
  if (!r.ok) {
    S.authRequired = owner && r.status === 401;
    S.err = body.error || r.statusText;
    render();
    throw new Error(S.err);
  }
  if (owner) S.authRequired = false;
  S.err = null;
  return body;
}

async function signIn() {
  const token = $("#studio-token").value.trim();
  if (!token) return;
  S.token = token;
  sessionStorage.setItem("studio-token", token);
  S.authRequired = false;
  S.err = null;
  try { await loadHome(); }
  catch (_) { sessionStorage.removeItem("studio-token"); S.token = ""; }
}

function authView() {
  if (S.authMode === "clerk") {
    queueMicrotask(mountClerkAuth);
    return `<section class="ownership-gate" data-testid="auth-screen" aria-labelledby="ownership-title">
      <div class="ownership-mark" aria-hidden="true">↗</div>
      <div class="flow-eyebrow">Claim your work</div>
      <h2 id="ownership-title">Your preview is safe. Sign in only to take it with you.</h2>
      <p class="workspace-lede">A verified practice account gives this workspace and source bundle an owner. It does not change what you built.</p>
      <div class="ownership-boundary" aria-label="Sign in boundary">
        <div><b>✓</b><span>Describe, compare treatments, review the diff, and publish a synthetic preview without an account.</span></div>
        <div><b>→</b><span>Sign in now only to claim the workspace and download its source.</span></div>
      </div>
      <div id="clerk-sign-in"></div>
      <button class="b primary-wide" onclick="cancelOwnership()">Return to preview</button>
      ${S.err ? `<p class="note">${esc(S.err)}</p>` : ""}
    </section>`;
  }
  return `<section class="scr" style="max-width:560px;margin:9vh auto;padding:28px">
    <div class="generic">Practice identity</div>
    <h2>Sign in to your studio</h2>
    <p class="muted">Enter the access token issued by your practice administrator. It stays in this browser tab and is never written to the server or URL.</p>
    <label for="studio-token"><b>Access token</b></label>
    <input id="studio-token" type="password" autocomplete="current-password" onkeydown="if(event.key==='Enter')signIn()">
    <button class="b bp primary-wide" onclick="signIn()">Continue</button>
    ${S.err ? `<p class="note">${esc(S.err)}</p>` : ""}
  </section>`;
}

async function loadScript(src, attrs = {}) {
  await new Promise((resolve, reject) => {
    const script = document.createElement("script");
    script.src = src;
    script.defer = true;
    script.crossOrigin = "anonymous";
    Object.entries(attrs).forEach(([key, value]) => script.setAttribute(key, value));
    script.onload = resolve;
    script.onerror = () => reject(new Error("Could not load the sign in service"));
    document.head.appendChild(script);
  });
}

async function initAuth() {
  const config = await fetch("/auth/config").then(response => response.json());
  if (config.mode !== "clerk") {
    await startWorkspace();
    return loadHome();
  }
  S.authMode = "clerk";
  sessionStorage.removeItem("studio-token");
  await startWorkspace();
  await loadHome();
  const domain = atob(config.publishable_key.split("_")[2]).slice(0, -1);
  await loadScript(`https://${domain}/npm/@clerk/ui@1/dist/ui.browser.js`);
  await loadScript(`https://${domain}/npm/@clerk/clerk-js@6/dist/clerk.browser.js`, {
    "data-clerk-publishable-key": config.publishable_key,
  });
  await Clerk.load({ui: {ClerkUI: window.__internal_ClerkUICtor}});
  S.clerkReady = true;
  if (Clerk.isSignedIn) S.token = await Clerk.session.getToken();
  S.owned = Clerk.isSignedIn && sessionStorage.getItem("studio-owned") === "true";
  Clerk.addListener(async ({session}) => {
    if (!session) {
      S.token = "";
      S.owned = false;
      sessionStorage.removeItem("studio-owned");
      if (!S.authRequired) {
        await startWorkspace();
        await loadHome();
      }
      return;
    }
    S.token = await session.getToken();
    S.authRequired = false;
    await resumePendingEject();
  });
  if (Clerk.isSignedIn && sessionStorage.getItem("studio-pending-eject")) {
    await resumePendingEject();
  } else if (S.owned) await loadHome(); else render();
  mountClerkUser();
}

let pendingEjectResume = null;
async function resumePendingEject() {
  if (pendingEjectResume) return pendingEjectResume;
  pendingEjectResume = (async () => {
    const pendingId = sessionStorage.getItem("studio-pending-eject");
    if (!pendingId) { render(); return; }
    S.appId = pendingId;
    S.scaffold = []; S.generating = false; S.review = null;
    await refreshApp();
    S.stage = S.app.stage === "live" ? "operate" : "preview";
    render();
  })();
  try { await pendingEjectResume; }
  finally { pendingEjectResume = null; }
}

function cancelOwnership() {
  S.authRequired = false;
  sessionStorage.removeItem("studio-pending-eject");
  render();
}

function mountClerkAuth() {
  const node = document.getElementById("clerk-sign-in");
  if (node && S.clerkReady && !Clerk.isSignedIn) Clerk.mountSignIn(node);
}

function mountClerkUser() {
  const node = document.getElementById("clerk-user");
  if (node && S.clerkReady && Clerk.isSignedIn) Clerk.mountUserButton(node);
}

async function loadHome() {
  const [p, a] = await Promise.all([api("/api/packs"), api("/api/apps", null, S.owned)]);
  S.packs = p.packs; S.apps = a.apps;
  if (!S.packSel && S.packs.length) S.packSel = S.packs[0].id;
  render();
}

async function refreshApp() {
  if (!S.appId) return;
  const [app, gate, audit, operate, sourceWorkspace] = await Promise.all([
    api(`/api/apps/${S.appId}`, null, S.owned),
    api(`/api/apps/${S.appId}/gate`, null, S.owned),
    api(`/api/apps/${S.appId}/audit`, null, S.owned),
    api(`/api/apps/${S.appId}/operate`, null, S.owned),
    api(`/api/apps/${S.appId}/workspace`, null, S.owned),
  ]);
  S.app = app; S.gate = gate; S.audit = audit.events; S.operate = operate; S.sourceWorkspace = sourceWorkspace;
  render();
}

// ---------- actions ----------

async function buildApp() {
  const prompt = $("#prompt") ? $("#prompt").value.trim() : S.prompt;
  if (!prompt || !S.packSel) return;
  const pack = S.packs.find(p => p.id === S.packSel);
  const name = prompt.length < 34 ? prompt : pack.name;
  const res = await api("/api/apps", {prompt, pack: S.packSel, name}, S.owned);
  S.appId = res.app.id; S.app = res.app;
  S.scaffold = res.scaffold.map(s => ({...s, shown:false}));
  S.pendingTask = prompt;
  S.sourceWorkspace = await api(`/api/apps/${S.appId}/workspace/treatments`, {task: prompt}, S.owned);
  S.selectedTreatmentId = null;
  S.treatmentRefinement = {presentation:"task-first", emphasis:""};
  S.generating = false; S.stage = "treatments"; S.review = null;
  await refreshApp();
}

async function iterate() {
  const box = $("#reply"); const instruction = box && box.value.trim();
  if (!instruction) return;
  S.pendingTask = instruction;
  S.sourceWorkspace = await api(`/api/apps/${S.appId}/workspace/treatments`, {task: instruction}, S.owned);
  S.selectedTreatmentId = null;
  S.treatmentRefinement = {presentation:"task-first", emphasis:""};
  S.stage = "treatments";
  render();
}

function selectTreatment(id) { S.selectedTreatmentId = id; render(); }

async function buildTreatment() {
  if (!S.selectedTreatmentId) return;
  S.generating = true; S.stage = "generating"; render();
  const refinement = {
    presentation: S.treatmentRefinement.presentation,
    ...(S.treatmentRefinement.emphasis.trim() ? {emphasis:S.treatmentRefinement.emphasis.trim()} : {})
  };
  await api(`/api/apps/${S.appId}/workspace/select`, {treatment_id:S.selectedTreatmentId, refinement}, S.owned);
  S.sourceWorkspace = await api(`/api/apps/${S.appId}/workspace/generate`, {task:S.pendingTask}, S.owned);
  S.generating = false; S.stage = "candidate"; render();
}

async function acceptCandidate() {
  const id = S.sourceWorkspace?.candidate?.id;
  if (!id || !S.sourceWorkspace.candidate.verification.passed) return;
  S.sourceWorkspace = await api(`/api/apps/${S.appId}/workspace/candidate/accept`, {candidate_id:id}, S.owned);
  S.stage = "preview";
  await refreshApp();
}

async function rejectCandidate() {
  const id = S.sourceWorkspace?.candidate?.id;
  if (!id) return;
  S.sourceWorkspace = await api(`/api/apps/${S.appId}/workspace/candidate/reject`, {candidate_id:id}, S.owned);
  S.selectedTreatmentId = null; S.treatmentRefinement = {presentation:"task-first", emphasis:""}; S.stage = "treatments"; render();
}

async function fixGate(id) { await api(`/api/apps/${S.appId}/gate/${id}/fix`, {}, S.owned); await refreshApp(); }
async function restore(v) { await api(`/api/apps/${S.appId}/restore`, {version: v}, S.owned); await refreshApp(); }
async function runReview() { S.review = await api(`/api/apps/${S.appId}/review`, {}, S.owned); S.stage = "gate"; await refreshApp(); }

async function promote() {
  const anonymous = S.app && S.app.tenant.startsWith("anon-");
  const cosigner = anonymous ? undefined : ($("#cosign") ? $("#cosign").value.trim() : "Dr. A. Osei");
  const synthetic_demo = anonymous || (S.gate && S.gate.report && S.gate.report.stubbed > 0);
  try {
    await api(`/api/apps/${S.appId}/promote`, {cosigner, synthetic_demo}, S.owned);
    S.modal = null; S.stage = "operate";
  } catch (e) { /* err already set; keep modal open so the lock is visible */ }
  await refreshApp();
}

async function rollback() { await api(`/api/apps/${S.appId}/rollback`, {}, S.owned); S.stage = "deploy"; await refreshApp(); }

async function openApp(id) {
  S.appId = id; S.scaffold = []; S.generating = false; S.review = null; S.sourceWorkspace = null;
  await refreshApp();
  S.stage = S.app.stage === "live" ? "operate" : "iterate";
  render();
}
function goHome() { S.appId = null; S.app = null; S.modal = null; S.sourceWorkspace = null; S.selectedTreatmentId = null; S.treatmentRefinement = {presentation:"task-first", emphasis:""}; loadHome(); }

async function requireOwnership() {
  if (S.authMode !== "clerk") return true;
  if (!window.Clerk?.isSignedIn) {
    S.authRequired = true;
    sessionStorage.setItem("studio-pending-eject", S.appId || "");
    render();
    return false;
  }
  if (!S.owned && S.app && S.app.tenant.startsWith("anon-")) {
    S.app = await api(`/api/apps/${S.appId}/claim`, {}, true);
    S.owned = true;
    sessionStorage.setItem("studio-owned", "true");
  }
  return true;
}

async function ejectApp() {
  if (!await requireOwnership()) return;
  const bundle = await api(`/api/apps/${S.appId}/export`, null, true);
  const blob = new Blob([JSON.stringify(bundle, null, 2)], {type:"application/json"});
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = `${S.app.id}.bundle.json`;
  link.click();
  URL.revokeObjectURL(link.href);
  sessionStorage.removeItem("studio-pending-eject");
}

async function exportAudit() {
  if (!await requireOwnership()) return;
  const token = S.authMode === "clerk" ? await Clerk.session.getToken() : S.token;
  const response = await fetch("/api/audit/export", {headers: token ? {authorization:`Bearer ${token}`} : {}});
  if (!response.ok) throw new Error("Could not export the audit record");
  const blob = await response.blob();
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "practice-studio-audit.jsonl";
  link.click();
  URL.revokeObjectURL(link.href);
}

// ---------- shared fragments ----------

const live = () => S.app && S.app.stage === "live";
const badge = () => live()
  ? S.app.allocation.pool === "synthetic-demo"
    ? `<span class="tag tb" style="margin-left:auto">SYNTHETIC DEMO · no tenant data</span>`
    : `<span class="tag tg" style="margin-left:auto">LIVE · ${esc(S.app.allocation.url)}</span>`
  : `<span class="tag ty" style="margin-left:auto">SANDBOX · synthetic data</span>`;

function meterHtml(withFix) {
  if (!S.gate) return "";
  if (live()) {
    // Preflight is a sandbox instrument; once live, the receipt is the
    // attestation pinned to the deploy, not a re-run of the checks.
    return `<b>Gate at release: ${esc(S.app.attestation.gate_summary)} ✓</b>
      <div class="sk track"><div class="fill" style="width:100%"></div></div>
      <div class="muted">co-signed ${esc(S.app.attestation.cosigner)} — attached to deploy v${S.app.allocation.app_version} in the audit record</div>`;
  }
  const r = S.gate.report;
  const rows = r.results.map(g => {
    const ok = g.status === "pass", stub = g.status === "stubbed";
    const fix = withFix && !ok && !stub && g.fixable ? `<span class="fixlink" onclick="fixGate('${g.id}')">fix</span>` : "";
    // A labeled stub satisfies the meter but is never drawn as a check (#3).
    return `<div class="gline ${ok || stub ? "pass" : "fail"}">${ok ? "✓" : stub ? "◐" : "○"} ${esc(g.title)}${stub ? ' <span class="muted">stubbed</span>' : ""}${fix}</div>`;
  }).join("");
  const done = r.passed + (r.stubbed || 0);
  return `<b>Compliance ${r.passed}/${r.total}${r.stubbed ? ` <span class="muted">+${r.stubbed} stubbed</span>` : ""}</b>
    <div class="sk track"><div class="fill" style="width:${r.total ? Math.max(4, 100*done/r.total) : 4}%"></div></div>
    ${rows}
    <div class="muted">${r.green ? (r.stubbed ? "build settled with a stub — synthetic demo available; production stays locked" : "all checks passed — production promotion unlocks below") : "checks fill in as you build — deploy unlocks at " + r.total + "/" + r.total}</div>`;
}

function versionChips() {
  if (!S.app) return "";
  return S.app.addenda.map(a =>
    `<span class="chip ${a.version === S.app.current_version ? "on" : ""}" onclick="restore(${a.version})" title="${esc(a.instruction)}">v${a.version}${a.version === S.app.current_version ? " ✓" : ""}</span>`
  ).join(" ");
}

function chatHtml() {
  const turns = S.app.addenda.map(a => `
    <div class="sk msg dr">"${esc(a.instruction)}"</div>
    <div>${esc(a.reply)}</div>`).join("");
  return `${turns}
    <div style="margin-top:auto" class="row">
      <input type="text" id="reply" placeholder="reply…" style="flex:1" onkeydown="if(event.key==='Enter')iterate()">
      <button class="b" onclick="iterate()">send</button>
    </div>`;
}

function previewHtml() {
  const feats = S.app.features.map(f => `<div class="sk feature">${esc(f)}</div>`).join("");
  return `<div class="ln" style="width:58%"></div>${feats}`;
}

function auditRows(limit) {
  const evs = [...S.audit].reverse().slice(0, limit || 8);
  return evs.map(e => {
    const t = new Date(e.at * 1000).toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
    // App-scoped view: sensitive values arrive as the doctor's own
    // plaintext (#8); the platform export keeps the hmac-sha256: form.
    const extra = e.sensitive ? Object.entries(e.sensitive).map(([k, v]) => ` · ${k}: “${v}”`).join("") : "";
    return `<div class="sk" style="padding:4px 9px;font-size:13px">${t} · ${esc(e.actor)} · ${esc(e.detail + extra)}</div>`;
  }).join("");
}

function describeHtml(title, protocolLabel, cta) {
  const selected = S.packs.find(p => p.id === S.packSel) || S.packs[0];
  const profileNames = {web:"Managed web app", stream:"Always-on stream", local:"Runs on your device"};
  const profileIcons = {web:"▦", stream:"≈", local:"⌁"};
  const profileClass = {web:"tb", stream:"ty", local:"tg"};
  const counts = S.packs.reduce((out, p) => (out[p.profile] = (out[p.profile] || 0) + 1, out), {});
  const cards = S.packs.map(p => `
    <button class="pack-card ${S.packSel === p.id ? "on" : ""}" onclick="S.packSel='${p.id}';S.prompt=document.querySelector('#prompt').value;render()" title="${esc(p.description)}">
      <span class="pack-card-top"><b>${esc(p.name)}</b><span class="tag ${profileClass[p.profile] || "tb"}">${esc(p.profile)}</span></span>
      <p>${esc(p.description)}</p>
    </button>`).join("");
  const appButtons = S.apps.length ? `<div class="existing-list">${S.apps.map(a => `<button class="b" onclick="openApp('${a.id}')">${esc(a.name)} <span class="tag ${a.stage === "live" ? "tg" : "ty"}">${a.stage}</span></button>`).join("")}</div>` : `<p class="muted">Your first tool will appear here with its complete build and audit history.</p>`;
  return `
  <section aria-labelledby="workspace-title">
    <div class="workspace-kicker">Clinician builder workspace</div>
    <h2 class="workspace-title" id="workspace-title">Turn a workflow problem into a tool you own.</h2>
    <p class="workspace-lede">Start with synthetic data, clear safeguards while you build, and leave with runnable Rust source, documentation, and deploy manifests.</p>
    <div class="summary-grid" aria-label="Workspace summary">
      <div class="summary-card"><span>Signed clinical starters</span><strong>${S.packs.length}</strong><span>every in-scope workflow has a runnable artifact</span></div>
      <div class="summary-card"><span>Runtime profiles</span><strong>3</strong><span>${counts.web || 0} web · ${counts.stream || 0} stream · ${counts.local || 0} local</span></div>
      <div class="summary-card"><span>Your tools</span><strong>${S.apps.length}</strong><span>${S.apps.filter(a => a.stage === "live").length} released · ${S.apps.filter(a => a.stage !== "live").length} in sandbox</span></div>
    </div>
  </section>
  <div class="scr">
    <div class="bar"><span class="dot"></span><b>${title}</b><span class="tag tb" style="margin-left:auto">SYNTHETIC LEARNING ENVIRONMENT</span></div>
    <div class="builder-grid">
      <div class="builder-primary">
        <label class="field-label" for="prompt">Describe the workflow you want to improve</label>
        <textarea id="prompt" rows="3" placeholder='Example: “a post-op recovery tracker for my knee replacement patients”'>${esc(S.prompt)}</textarea>
        <p class="field-help">Write it the way you would explain it to a colleague. No technical specification needed.</p>
        <div class="catalogue-head"><h3>Choose a clinical starter</h3><span>${protocolLabel}</span></div>
        <div class="pack-grid">${cards}</div>
      </div>
      <aside class="builder-aside" aria-label="Selected starter details">
        <div class="aside-icon" aria-hidden="true">${profileIcons[selected?.profile] || "▦"}</div>
        <div class="workspace-kicker" style="margin-top:16px">Selected starter</div>
        <h3 class="selected-title">${esc(selected?.name || "Choose a pack")}</h3>
        <p class="selected-copy">${esc(selected?.description || "Select a signed starter to see its safeguards and runtime.")}</p>
        <div class="profile-list">
          <div class="profile-row"><span class="check-dot">✓</span><span><b>${esc(profileNames[selected?.profile] || "Managed runtime")}</b>Profile: ${esc(selected?.profile || "—")} · wave ${esc(selected?.wave || "—")}</span></div>
          <div class="profile-row"><span class="check-dot">✓</span><span><b>${selected?.gates?.length || 0} safeguards declared</b>Gate status stays visible from sandbox through release.</span></div>
          <div class="profile-row"><span class="check-dot">✓</span><span><b>Owned artifact included</b>Rust source, runbook, compliance record, fixture, and deploy manifests.</span></div>
        </div>
        <div class="safety-callout"><b>Safe starting boundary</b><br>This workspace accepts synthetic examples only. A failing safeguard cannot silently unlock real patient data.</div>
        <button class="b bp primary-wide" onclick="buildApp()">${cta}</button>
        <div class="catalogue-head" style="margin-top:26px"><h3>Your recent tools</h3><span>${S.apps.length}</span></div>
        ${appButtons}
      </aside>
    </div>
  </div>`;
}

function errHtml() {
  return S.err ? `<div class="note" style="margin:8px 2px">⚠ ${esc(S.err)}</div>` : "";
}

// ---------- skin 1a: builder workspace ----------

function viewBuilder() {
  if (!S.app) return describeHtml("New app", "Start from a pack (pre-wired for HIPAA):", "Build it →");

  const genPane = S.generating || S.scaffold.some(s => !s.shown)
    ? S.scaffold.map(s => s.shown ? `<div>✓ ${esc(s.label)}</div>` : `<div style="color:#888">▍building…</div>`).join("")
    : chatHtml();

  const drawer = S.drawer ? `
    <div class="drawer">
      <div class="row"><b>⌄ Under the hood</b><span class="muted" style="margin-left:auto">read-only</span></div>
      <div>runtime: <b>web</b> · image ${live() ? esc(S.app.allocation.image) : "client-v2026.07.1"} · region nyc3 · pool ${live() ? "prod" : "sandbox"}</div>
      <div>routes: ${S.app.routes} — <span class="tag tg">all ${S.app.routes} hipaa-core wired</span> · encryption keys: Vault ✓</div>
      <div>data: ${S.app.data_source.kind === "synthetic" ? `synthetic set "${esc(S.app.data_source.name)}" — no real PHI can reach this box` : `tenant database ${esc(S.app.data_source.name)} — every access logged`}</div>
    </div>` : "";

  const preflight = S.modal === "preflight" && S.gate ? (() => {
    const r = S.gate.report;
    const rows = r.results.map(g => g.status === "pass"
      ? `<div class="pass">✓ ${esc(g.title)}</div>`
      : g.status === "stubbed"
      ? `<div class="pass">◐ ${esc(g.title)} — <span class="muted">stubbed: ${esc(g.reason)}</span></div>`
      : `<div class="fail">✗ ${esc(g.title)} — ${esc(g.reason)} ${g.fixable ? `<button class="b" style="font-size:12px;padding:1px 8px" onclick="fixGate('${g.id}')">fix it for me</button>` : ""}</div>`).join("");
    const needsReview = r.results.some(g => g.id === "human-review" && g.status !== "pass");
    return `<div class="modalwrap"><div class="modal">
      <b>Preflight — ${r.total} checks before real patients</b>
      ${rows}
      ${needsReview ? `<button class="b" onclick="runReview()">request platform review</button>` : ""}
      ${S.gate.reviewer_note ? `<div class="sk" style="padding:5px 9px;background:#f4f2ec;font-size:13px">"${esc(S.gate.reviewer_note)}" — platform reviewer</div>` : ""}
      <div class="row" style="margin-top:6px">
        <input type="text" id="cosign" placeholder="co-sign: Dr. A. Osei" style="flex:1">
        <button class="b bp ${r.green ? "" : "locked"}" ${r.green ? "" : "disabled"} onclick="promote()">${r.green ? (r.stubbed ? "Publish synthetic demo →" : "Deploy to production →") : `Deploy — locked (${r.total - r.passed - (r.stubbed || 0)} failing)`}</button>
      </div>
      <span class="fixlink" style="margin-left:0" onclick="S.modal=null;render()">close</span>
    </div></div>`;
  })() : "";

  const operatePane = live() ? `
    <div class="row">
      <div class="sk" style="flex:1;padding:6px 10px">uptime <b>${S.operate.metrics.available ? `${S.operate.metrics.uptime_pct}%` : "unavailable"}</b></div>
      <div class="sk" style="flex:1;padding:6px 10px">p95 <b>${S.operate.metrics.available ? `${S.operate.metrics.p95_ms}ms` : "unavailable"}</b></div>
      <div class="sk" style="flex:1;padding:6px 10px">allocation <b>${esc(S.app.allocation.id)}</b></div>
    </div>
    <b style="font-family:'Shantell Sans',sans-serif;font-size:12px">Who touched what</b>
    ${auditRows(6)}
    <div class="row">
      <button class="b" style="font-size:12.5px" onclick="ejectApp()">Make this mine · export</button>
      <button class="b" style="font-size:12.5px" onclick="exportAudit()">export audit log</button>
      <button class="b" style="font-size:12.5px" onclick="rollback()">rollback</button>
    </div>` : previewHtml();

  return `
  <div class="scr">
    <div class="bar"><span class="dot"></span>${esc(S.app.name)} ${badge()}
      <span style="display:flex;gap:4px;margin-left:10px">${versionChips()}</span>
    </div>
    <div class="split">
      <div class="left">${genPane}</div>
      <div class="right">${operatePane}${preflight}</div>
    </div>
    ${drawer}
    <div class="bar" style="border-top:1.4px solid #2b2b2b;border-bottom:none">
      <button class="b" onclick="goHome()">← apps</button>
      <button class="b" onclick="S.drawer=!S.drawer;render()">${S.drawer ? "⌃ hide" : "⌄ under the hood"}</button>
      ${live() ? "" : `<button class="b bp" style="margin-left:auto" onclick="S.modal='preflight';render()">Preflight & deploy</button>`}
    </div>
  </div>`;
}

const STAGES = ["describe","generate","preview","iterate","gate","deploy","operate","audit"];

function railHtml() {
  return `<div class="rail">${STAGES.map(s =>

}

      ${needsReview ? `<button class="b" style="align-self:flex-start" onclick="runReview()">request platform review</button>` : ""}
      ${S.gate.reviewer_note ? `<div class="sk" style="padding:5px 9px;background:#f4f2ec">"${esc(S.gate.reviewer_note)}" — platform reviewer</div>` : ""}
      <div class="sk" style="padding:8px 12px;font-size:13.5px">

    body = `<div style="display:flex;flex:1;min-height:0">

      </div>
    </div>`;
  }

  return `
  <div class="scr">
    <div class="bar">${railHtml()}</div>
    <div style="display:flex;min-height:430px">
      <div style="flex:1;display:flex;flex-direction:column">${badgeRow()}${body}</div>

  if (S.stage === "treatments" && S.sourceWorkspace?.treatment_plan) return shaktiTreatments();

  const turns = S.app.addenda.map(addendum => `<div class="bubble user">${esc(addendum.instruction)}</div><div class="bubble">${esc(addendum.reply)}</div>`).join("");
  const progress = S.generating ? S.scaffold.map(step => `<div class="bubble">${step.shown ? "✓" : "…"} ${esc(step.label)}</div>`).join("") : "";
  const features = S.app.features.map(feature => `<div class="preview-feature">✓ ${esc(feature)}</div>`).join("");
  const gate = S.gate?.report;
  return `<div class="flow-shell" data-testid="studio">
    <div class="row"><button class="b" onclick="goHome()">← Your ideas</button><div><div class="flow-eyebrow">${esc(S.app.name)}</div><span class="muted">You talk here · your app responds there</span></div>${S.sourceWorkspace ? `<span class="checkpoint-badge" data-testid="checkpoint-badge">checkpoint v${S.sourceWorkspace.accepted.version}</span>` : ""}${badge()}</div>

    </section>
    ${shaktiGate()}
  </div>`;
}

function agentBadge(provenance) {
  if (!provenance) return `<span class="tag ty" data-testid="agent-provenance">Agent provenance unavailable</span>`;
  const fallback = provenance.fallback_reason;
  if (provenance.provider === "digitalocean" && !fallback) {
    const version = provenance.deployment_version ? ` · ${provenance.deployment_version.slice(0, 10)}` : "";
    return `<span class="tag tg" data-testid="agent-provenance">DigitalOcean · ${esc(provenance.model)}${esc(version)}</span>`;
  }
  const detail = fallback ? `DigitalOcean unavailable (${fallback}) · ` : "";
  return `<span class="tag ty" data-testid="agent-provenance">${esc(detail)}Safe deterministic floor</span>`;
}

function materializerBadge(provenance) {
  if (provenance?.provider === "rust") return `<span class="tag tg" data-testid="materializer-provenance">Rust materializer · ${esc(provenance.model)}</span>`;
  return agentBadge(provenance);
}

function shaktiTreatments() {
  const plan = S.sourceWorkspace.treatment_plan;
  const postOp = S.app?.pack === "post-op-monitor";
  const cards = plan.treatments.map(treatment => {
    const recommended = treatment.id === plan.recommended_treatment_id;
    const selected = treatment.id === S.selectedTreatmentId;
    return `<label class="treatment-card" data-testid="treatment-card">
      <input type="radio" name="treatment" value="${esc(treatment.id)}" ${selected ? "checked" : ""} onchange="selectTreatment(this.value)">
      <div class="row"><span class="tag tb">Approach</span>${recommended ? `<span class="tag tg" data-testid="treatment-recommended">Recommended</span>` : ""}</div>
      <h3>${esc(treatment.label)}</h3><p>${esc(treatment.user_outcome)}</p>
      <div><b>What changes on screen</b><ul>${treatment.screen_changes.map(item => `<li>${esc(item)}</li>`).join("")}</ul></div>
      <div><b>What changes in the workflow</b><ul>${treatment.data_changes.map(item => `<li>${esc(item)}</li>`).join("") || "<li>No new data required.</li>"}</ul></div>
      <div class="safety-callout"><b>Safety stays visible</b><br>${esc(treatment.safety_notes.join(" "))}</div>
    </label>`;
  }).join("");
  const refinement = S.selectedTreatmentId ? `<section class="refinement-card" data-testid="treatment-refinement"><div class="flow-eyebrow">Make it fit your workflow</div><h3>${postOp ? "What should the patient understand first?" : "What should the user understand first?"}</h3><div class="refinement-options"><label><input type="radio" name="presentation" value="task-first" ${S.treatmentRefinement.presentation === "task-first" ? "checked" : ""} onchange="S.treatmentRefinement.presentation=this.value;render()"><b>${postOp ? "Check-in first" : "Workflow first"}</b><span>Lead with the task, then explain the treatment.</span></label><label><input type="radio" name="presentation" value="context-first" ${S.treatmentRefinement.presentation === "context-first" ? "checked" : ""} onchange="S.treatmentRefinement.presentation=this.value;render()"><b>${postOp ? "Follow-up first" : "Context first"}</b><span>Explain what happens next before the task begins.</span></label></div><label class="col"><b>Anything you want to emphasize?</b><span class="muted">Optional · one short synthetic-workflow note</span><textarea maxlength="500" rows="3" oninput="S.treatmentRefinement.emphasis=this.value">${esc(S.treatmentRefinement.emphasis)}</textarea></label></section>` : "";
  return `<div class="treatment-shell" data-testid="treatment-screen"><div class="row"><button class="b" onclick="goHome()">← Your ideas</button><span class="tag ty">Synthetic workspace</span>${agentBadge(S.sourceWorkspace.plan_agent)}</div><div class="flow-eyebrow" style="margin-top:24px">Choose the shape before code changes</div><h2 style="font-size:34px;margin:7px 0">Three bounded ways to solve this.</h2><p class="workspace-lede">${esc(plan.problem)}. Compare what each approach changes, then choose one. Nothing has changed in your accepted source yet.</p><div class="treatment-grid">${cards}</div>${refinement}<div class="row"><button class="b" onclick="S.app=null;S.appId=null;render()">Try a different idea</button><button class="b bp" data-testid="build-treatment" style="margin-left:auto" ${S.selectedTreatmentId ? "" : "disabled"} onclick="buildTreatment()">Build this for my workflow →</button></div></div>`;
}

function shaktiGenerating() {
  const steps = ["Planning the Svelte screens", "Preparing the Rust service boundary", "Checking synthetic examples", "Preparing your review"];
  return `<section class="prompt-card" data-testid="generation-status" style="margin-top:9vh"><div class="flow-eyebrow">Building a candidate</div><h2>Preparing changes for your review.</h2><p class="muted">Your accepted checkpoint stays unchanged until you approve the diff.</p><div class="verification-list">${steps.map((step,index) => `<div class="verification-row">${index === 0 ? "●" : "○"} ${step}</div>`).join("")}</div></section>`;
}

function shaktiCandidateReview() {
  const candidate = S.sourceWorkspace.candidate;
  const selection = S.sourceWorkspace.selected_treatment;
  const planningCopy = selection?.planner?.provider === "digitalocean"
    ? "Gemma planned the treatment."
    : "Rust prepared a model-free fallback treatment because Gemma was unavailable.";
  const checks = candidate.verification.checks.map(check => `<div class="verification-row" data-testid="verification-check"><b>${check.status === "pass" ? "✓" : "!"} ${esc(check.id)}</b><div class="muted">${esc(check.detail)}</div></div>`).join("");
  const diffs = candidate.diff.map(file => `<div data-testid="diff-file"><div class="row" style="margin-bottom:8px"><b>${esc(file.path)}</b><span class="tag tb" style="margin-left:auto">reviewed file</span></div><pre class="diff-view">${esc(file.unified)}</pre></div>`).join("");
  const treatmentReceipt = selection ? `<div class="preview-app" data-testid="treatment-receipt"><div class="row"><span class="tag tb">${esc(selection.refinement.presentation === "context-first" ? "CONTEXT FIRST" : "TASK FIRST")}</span>${agentBadge(selection.planner)}</div><h3>${esc(selection.treatment.label)}</h3><p>${esc(selection.treatment.user_outcome)}</p>${selection.refinement.emphasis ? `<div class="safety-callout"><b>Your emphasis</b><br>${esc(selection.refinement.emphasis)}</div>` : ""}<div><b>What will change on screen</b><ul>${selection.treatment.screen_changes.map(item => `<li>${esc(item)}</li>`).join("")}</ul></div><div class="safety-callout">Rust changes presentation only. Clinical thresholds, routes, and audit behavior remain fixed.</div></div>` : "";
  return `<div class="flow-shell" data-testid="candidate-review"><div class="row"><button class="b" onclick="rejectCandidate()">← Approaches</button><span class="tag tb">GUEST · NO SIGN-IN REQUIRED</span>${materializerBadge(S.sourceWorkspace.generation_agent)}<span class="checkpoint-badge">accepted checkpoint v${S.sourceWorkspace.accepted.version}</span></div><div class="review-shell"><section class="review-panel"><div class="flow-eyebrow">Does this solve your workflow?</div><h2>${esc(candidate.summary)}</h2>${treatmentReceipt}<h3>Source diff</h3>${diffs}</section><aside class="review-panel"><div class="flow-eyebrow">Rust verification</div><h2>Know what was checked.</h2><p class="muted">${planningCopy} Rust materialized one bounded configuration file and chose every executable check.</p><div class="verification-list">${checks}</div>${candidate.verification.passed ? `<p class="safety-callout pass">All required checks passed. Accepting creates one immutable checkpoint.</p>` : `<p class="safety-callout">This version was not applied. Your last working version is unchanged.</p>`}<div class="col"><button class="b bp" data-testid="accept-candidate" ${candidate.verification.passed ? "" : "disabled"} onclick="acceptCandidate()">Accept these changes</button><button class="b" data-testid="revise-candidate" onclick="rejectCandidate()">Revise the approach</button></div></aside></div></div>`;
}

function shaktiGate() {
  if (S.modal !== "preflight" || !S.gate) return "";
  const report = S.gate.report;
  const checks = report.results.map(result => `<div class="gate-item ${result.status === "fail" ? "fail" : "pass"}"><b>${result.status === "pass" ? "✓" : result.status === "stubbed" ? "◐" : "!"}</b><div><b>${esc(result.title)}</b><div class="muted">${esc(result.reason || (result.status === "pass" ? "Verified from the current build." : "Could not verify."))}</div></div>${result.fixable && result.status === "fail" ? `<button class="b" onclick="fixGate('${result.id}')">Fix it</button>` : ""}</div>`).join("");
  const needsReview = report.results.some(result => result.id === "human-review" && result.status !== "pass");
  const anonymous = S.app.tenant.startsWith("anon-");
  return `<div class="gate-backdrop" data-testid="gate-dialog"><section class="gate-card"><div class="flow-eyebrow">Release gate</div><h2 style="margin:7px 0">Know what is ready before anyone uses it.</h2><p class="muted">If a check cannot run, it appears as failed to verify. It never appears as passed.</p><div class="gate-list">${checks}</div>${needsReview ? `<button class="b" onclick="runReview()">Request a recorded review</button>` : ""}${S.gate.reviewer_note ? `<p class="safety-callout">${esc(S.gate.reviewer_note)}</p>` : ""}<div class="row" style="margin-top:18px"><button class="b" onclick="S.modal=null;render()">Return to studio</button>${!anonymous ? `<input id="cosign" type="text" placeholder="Co-signer name" style="max-width:210px">` : ""}<button class="b bp" style="margin-left:auto" ${report.green ? "" : "disabled"} onclick="promote()">${anonymous ? "Publish synthetic preview" : "Co-sign and release"} →</button></div></section></div>`;
}

function shaktiLive() {
  const synthetic = S.app.allocation?.pool === "synthetic-demo";
  return `<div class="live-shell" data-testid="live-dashboard"><div class="row"><button class="b" onclick="goHome()">← Your ideas</button><span class="tag ${synthetic ? "tb" : "tg"}" data-testid="environment-badge">${synthetic ? "SYNTHETIC DEMO" : "LIVE"}</span></div><section class="live-hero"><div class="flow-eyebrow">It is running</div><h2 style="margin:7px 0">${esc(S.app.name)}</h2><p>${synthetic ? "This isolated preview uses synthetic examples and cannot reach a patient database." : "This release passed its frozen gate and carries an authenticated clinical attestation."}</p><div class="row"><span class="tag tg">gate ${esc(S.app.attestation.gate_summary)}</span><span class="muted">allocation ${esc(S.app.allocation.id)}</span></div></section><div class="live-grid"><section class="live-card"><div class="flow-eyebrow">Release record</div><h3>What happened</h3><div class="audit-list">${auditRows(8)}</div></section><aside class="live-card"><div class="flow-eyebrow">Ownership</div><h3>Take the whole thing with you.</h3><p class="muted">Sign in only when you are ready to claim this workspace and eject the Svelte client, Rust server, synthetic fixtures, one README, Svelte MCP setup, and editable diagrams.</p><button class="b bp primary-wide" data-testid="eject-button" onclick="ejectApp()">Make this mine · export</button><button class="b primary-wide" onclick="rollback()">Return to studio</button><div style="margin-top:18px" data-testid="runtime-status"><b>Runtime status</b><p class="muted">${S.operate?.metrics?.available ? "Telemetry is available." : "Runtime telemetry is not yet available. No health claim is fabricated."}</p></div></aside></div></div>`;
}

function render() {
  $("#skins").innerHTML = `<span class="muted">Build · verify · own</span>`;
  const identityLabel = S.authMode !== "clerk" ? "Local workspace" : window.Clerk?.isSignedIn ? "Verified owner" : "Guest workspace";
  $("header .who").innerHTML = `<span class="tag ${window.Clerk?.isSignedIn ? "tg" : "ty"}">${identityLabel}</span> <span id="clerk-user"></span>`;
  if (S.authRequired) { $("#main").innerHTML = authView(); return; }
  $("#main").innerHTML = errHtml() + (!S.app ? shaktiDescribe() : live() ? shaktiLive() : shaktiStudio());
  mountClerkUser();
}

initAuth().catch(error => {
  S.err = error.message;
  S.authRequired = false;
  render();
});
</script>
</body>
</html>
