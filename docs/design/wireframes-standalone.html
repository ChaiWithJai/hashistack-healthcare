document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

14}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<section class=\"dv-turn\" id=\"t1\">\n<div class=\"dv-thd\"><a class=\"dv-tid\" href=\"#t1\">1<\u002Fa><span class=\"dv-tname\">Describe → audit storyboards — three UX structures, three levels of machinery, three gate treatments · plus the architecture diagram<\u002Fspan><\u002Fdiv>\n<div class=\"dv-opts\">\n\n<!-- ============ 1a BUILDER WORKSPACE ============ -->\n<div class=\"dv-opt\" id=\"1a\">\n<div class=\"dv-olabel\"><a class=\"dv-oid\" href=\"#1a\">1a<\u002Fa>Builder workspace — chat + live preview (Lovable-shaped). Machinery in an optional \"under the hood\" drawer. Gate = preflight checklist modal.<\u002Fdiv>\n<div class=\"dv-card\" style=\"width:1050px\">\n<div class=\"wf-grid\">\n\n<div class=\"wf\"><div class=\"wf-cap\">① Describe <span>— prompt + pack pick, one screen<\u002Fspan><\u002Fdiv>\n<div class=\"scr\">\n<div class=\"bar\"><span class=\"dot\"><\u002Fspan><b>New app<\u002Fb><span style=\"margin-left:auto;font-size:10.5px;color:#888\">dr. osei · Meridian Family Practice<\u002Fspan><\u002Fdiv>\n<div style=\"padding:10px 14px;display:flex;flex-direction:column;gap:8px\">\n<div>What do you want to build?<\u002Fdiv>\n<div class=\"sk\" style=\"padding:7px 9px;min-height:34px;color:#555\">\"a post-op recovery tracker for my knee replacement patients\"<\u002Fdiv>\n<div style=\"font-size:11px;color:#777\">Start from a pack (pre-wired for HIPAA):<\u002Fdiv>\n<div style=\"display:flex;gap:6px\">\n<span class=\"chip\" style=\"border-style:solid;border-color:#2a78d6\">post-op monitor ✓<\u002Fspan>\n<span class=\"chip\">patient intake<\u002Fspan>\n<span class=\"chip\">HTN tracker<\u002Fspan>\n<\u002Fdiv>\n<div style=\"display:flex;justify-content:flex-end;gap:6px;margin-top:2px\"><span class=\"b bp\">Build it →<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv><\u002Fdiv>\n\n<div class=\"wf\"><div class=\"wf-cap\">② Generate <span>— agent builds, preview appears live<\u002Fspan><\u002Fdiv>\n<div class=\"scr\">\n<div class=\"bar\"><span class=\"dot\"><\u002Fspan>post-op tracker <span class=\"tag ty\" style=\"margin-left:auto\">SANDBOX · synthetic data<\u002Fspan><\u002Fdiv>\n<div style=\"display:flex;flex:1;min-height:0\">\n<div style=\"width:44%;border-right:1.4px solid #2b2b2b;padding:7px;display:flex;flex-direction:column;gap:5px;font-size:11.5px\">\n<div>⚙ scaffolding from pack…<\u002Fdiv>\n<div>✓ pain + wound check-in form<\u002Fdiv>\n<div>✓ photo upload (encrypted)<\u002Fdiv>\n<div>✓ audit log wired to every route<\u002Fdiv>\n<div style=\"color:#888\">▍building daily reminder…<\u002Fdiv>\n<\u002Fdiv>\n<div style=\"flex:1;padding:8px;display:flex;flex-direction:column;gap:6px\">\n<div class=\"ln\" style=\"width:60%\"><\u002Fdiv>\n<div class=\"sk\" style=\"height:26px\"><\u002Fdiv>\n<div class=\"sk\" style=\"height:26px\"><\u002Fdiv>\n<div style=\"display:flex;gap:5px\"><span class=\"b\">😣 3<\u002Fspan><span class=\"b\">🙂 6<\u002Fspan><span class=\"b\">😀 9<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv><\u002Fdiv>\n\n<div class=\"wf\"><div class=\"wf-cap\">③ Iterate <span>— conversational edits, checkpoints<\u002Fspan><\u002Fdiv>\n<div class=\"scr\">\n<div class=\"bar\"><span class=\"dot\"><\u002Fspan>post-op tracker <span style=\"margin-left:auto;display:flex;gap:4px\"><span class=\"chip\">v1<\u002Fspan><span class=\"chip\">v2<\u002Fspan><span class=\"chip\" style=\"border-style:solid\">v3 ✓<\u002Fspan><\u002Fspan><\u002Fdiv>\n<div style=\"display:flex;flex:1;min-height:0\">\n<div style=\"width:44%;border-right:1.4px solid #2b2b2b;padding:7px;display:flex;flex-direction:column;gap:6px;font-size:11.5px\">\n<div class=\"sk\" style=\"padding:4px 6px;background:#eef3fb\">\"make pain a 0–10 scale and flag anything over 7 to me\"<\u002Fdiv>\n<div>✓ done — flags route to your inbox. Nothing leaves the sandbox yet.<\u002Fdiv>\n<div style=\"margin-top:auto\" class=\"sk\"><div style=\"padding:3px 6px;color:#999\">reply…<\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n<div style=\"flex:1;padding:8px;display:flex;flex-direction:column;gap:6px\">\n<div class=\"ln\" style=\"width:55%\"><\u002Fdiv>\n<div class=\"sk\" style=\"height:18px;display:flex;align-items:center;padding:0 6px;gap:3px;font-size:10px\">0 · 2 · 4 · 6 · <b style=\"color:#b33\">8<\u002Fb> · 10<\u002Fdiv>\n<div class=\"sk\" style=\"height:40px\"><\u002Fdiv>\n<div class=\"b\" style=\"align-self:flex-start;font-size:11px\">↩ restore v2<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv><\u002Fdiv>\n\n<div class=\"wf\"><div class=\"wf-cap\">④ Under the hood <span>— optional drawer for the tinkerer<\u002Fspan><\u002Fdiv>\n<div class=\"scr\">\n<div class=\"bar\"><span class=\"dot\"><\u002Fspan>post-op tracker<\u002Fdiv>\n<div style=\"flex:1;padding:8px;display:flex;flex-direction:column;gap:5px;opacity:.45\">\n<div class=\"ln\" style=\"width:50%\"><\u002Fdiv>\n<div class=\"sk\" style=\"height:24px\"><\u002Fdiv>\n<div class=\"sk\" style=\"height:24px\"><\u002Fdiv>\n<\u002Fdiv>\n<div style=\"border-top:1.4px solid #2b2b2b;background:#f4f2ec;padding:7px 10px;font-size:11px;display:flex;flex-direction:column;gap:3px\">\n<div style=\"display:flex;justify-content:space-between\"><b>⌄ Under the hood<\u002Fb><span style=\"color:#888\">read-only<\u002Fspan><\u002Fdiv>\n<div>runtime: <b>web<\u002Fb> · image v2026.07.1 · region nyc3<\u002Fdiv>\n<div>routes: 6 — <span class=\"tag tg\">all 6 hipaa-core wired<\u002Fspan> · encryption keys: Vault ✓<\u002Fdiv>\n<div>data: synthetic set \"post-op demo (12 pts)\" — no real PHI can reach this box<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv><\u002Fdiv>\n\n<div class=\"wf\"><div class=\"wf-cap\">⑤ Gate <span>— preflight modal before anything real<\u002Fspan><\u002Fdiv>\n<div class=\"scr\">\n<div class=\"bar\"><span class=\"dot\"><\u002Fspan>post-op tracker<\u002Fdiv>\n<div style=\"flex:1;position:relative;background:#eceae4\">\n<div style=\"position:absolute;inset:14px 22px;background:#fff;border:1.6px solid #2b2b2b;border-radius:8px;padding:9px 12px;display:flex;flex-dir n<b>SANDBOX POOL<\u002Fb> — untrusted generated code<br>\n<span style=\"font-size:11px\">synthetic data only · <b>no route to prod databases<\u002Fb> · docker → microVM later (driver swap, doctor never notices)<\u002Fspan>\n<\u002Fdiv>\n<div style=\"display:flex;align-items:center;color:#2a78d6\"><b>—gate→<\u002Fb><\u002Fdiv>\n<div class=\"sk\" style=\"flex:1;padding:8px 10px;background:#e2f0e7;border-style:dashed\">\n<b>PROD POOL<\u002Fb> — promoted apps only<br>\n<span style=\"font-size:11px\">only pool with tenant Postgres access · real PHI lives here, under BAA<\u002Fspan>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n\n<div style=\"text-align:center;color:#888\">↓ Terraform-managed, Packer-imaged, immutable ↓<\u002Fdiv>\n\n<div class=\"sk\" style=\"padding:10px 14px;background:#fdfdfb\">\n<b style=\"font-family:'Shantell Sans',sans-serif;font-size:12px\">INFRASTRUCTURE — DigitalOcean, under BAA<\u002Fb>\n<div style=\"display:flex;gap:10px;margin-top:8px\">\n<div class=\"sk\" style=\"flex:1;padding:5px 8px\">VPC per env<\u002Fdiv>\n<div class=\"sk\" style=\"flex:1;padding:5px 8px\">Droplets (3 control + pools)<\u002Fdiv>\n<div class=\"sk\" style=\"flex:1;padding:5px 8px\">managed Postgres · per-tenant db<\u002Fdiv>\n<div class=\"sk\" style=\"flex:1;padding:5px 8px\">Spaces (encrypted uploads)<\u002Fdiv>\n<div class=\"sk\" style=\"flex:1;padding:5px 8px\">Load Balancer (single ingress)<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"note\" style=\"text-align:right\">everything above the platform layer is swappable without the doctor noticing — that's the point<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fdiv>\n<p class=\"dv-next\">Try next: \"storyboard <a class=\"dv-oid\" href=\"#1c\">1c<\u002Fa>'s co-sign as a full-size screen\" · \"merge <a class=\"dv-oid\" href=\"#1a\">1a<\u002Fa>'s layout with <a class=\"dv-oid\" href=\"#1b\">1b<\u002Fa>'s continuous meter\" · \"wireframe the pack registry\"<\u002Fp>\n<\u002Fsection>\n\n<\u002Fx-dc>\n\n\n<\u002Fbody><\u002Fhtml>"
