# Platform eval harness (evals/README.md): the two nested layers — job-to-be-
# done workflows over a fresh control plane per scenario, plus pack-owned
# quality contracts interpreted through Playwright against all runnable packs
# ejected apps — scored into the portable scorecard baseline.
name: evals

on:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "45 5 * * *" # nightly, offset from staging-hashistack

jobs:
  evals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # The dev container preinstalls Playwright + Chromium under /opt;
      # CI lacks that path, so install both here (the harness detects which
      # world it is in and uses the default browser cache).
      - run: npm install --no-save playwright
      - run: npx playwright install --with-deps chromium
      - run: ./scripts/evals.sh
      # Prove the exported Docker image is one product: the pack-specific
      # clinical workflow at / and its connected Svelte workspace at
      # /workspace/ share the same Rust service and origin.
      - run: node evals/export-runtime/proof.mjs
      # Prove that a clinician can change an owned export, import it as a new
      # private synthetic starter, and export the same source bytes again.
      - run: node evals/reimport/proof.mjs
      - run: ./scripts/journey.sh
      # The regenerated scorecard + full screenshot evidence, reviewable per
      # run without committing from CI.
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-scorecard
          path: |
            docs/evals/scorecard.md
            docs/evals/scorecard.json
            docs/evals/journey/
            .evals/screenshots/
            .evals/export-runtime/
            .evals/reimport/
          if-no-files-found: warn
