<style>
/* Sketchy wireframe kit, carried over from the design export so the running
   app and the storyboards read as the same object. */

.skins button.on{background:#2a78d6;color:#fff}

.b{display:inline-flex;align-items:center;justify-content:center;gap:5px;border:1.4px solid #2b2b2b;border-radius:6px;padding:4px 11px;background:#fff;font-family:'Patrick Hand',cursive;font-size:14px;cursor:pointer}

body{background:var(--canvas);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--ink);font-size:14px}
a{color:var(--brand)}
header{position:sticky;top:0;z-index:30;min-height:64px;padding:0 28px;background:rgba(255,255,255,.96);border-bottom:1px solid var(--line);box-shadow:0 1px 2px rgba(15,23,42,.04);backdrop-filter:blur(12px)}
header h1{font-size:15px;font-weight:700;letter-spacing:-.01em;color:var(--ink)}
header h1:before{content:"✦";display:inline-grid;place-items:center;width:30px;height:30px;margin-right:10px;border-radius:9px;background:var(--brand);color:white}

.bar{min-height:52px;padding:10px 16px;border-bottom:1px solid var(--line);background:#fff;font-family:inherit;font-size:13px}

/* Catalogue/dashboard composition inspired by Tailwind Plus application UI:

.workspace-kicker{font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--brand)}

.builder-grid{display:grid;grid-template-columns:minmax(0,1.45fr) minmax(290px,.7fr);min-height:560px}

.pack-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:9px}

.pack-card.on{border-color:#818cf8;background:#eef2ff;box-shadow:0 0 0 2px #e0e7ff}
.pack-card-top{display:flex;align-items:center;gap:8px}.pack-card-top b{font-size:13px}.pack-card-top .tag{margin-left:auto}

.aside-icon{display:grid;place-items:center;width:42px;height:42px;border-radius:11px;background:#e0e7ff;color:var(--brand-dark);font-size:20px}
.selected-title{margin:14px 0 5px;font-size:18px;letter-spacing:-.02em}
.selected-copy{margin:0;color:var(--muted);font-size:13px;line-height:1.55}
.profile-list{display:flex;flex-direction:column;gap:9px;margin:18px 0}
.profile-row{display:flex;gap:9px;align-items:flex-start;font-size:12px;color:#475569}.profile-row b{display:block;color:#1e293b}
.check-dot{display:grid;place-items:center;flex:none;width:20px;height:20px;border-radius:999px;background:#d1fae5;color:#047857;font-size:11px;font-weight:800}
.safety-callout{padding:12px;border:1px solid #c7d2fe;border-radius:10px;background:#eef2ff;color:#3730a3;font-size:12px;line-height:1.5}
.primary-wide{width:100%;min-height:40px;margin-top:16px}
.existing-list{display:grid;gap:8px;margin-top:14px}.existing-list .b{justify-content:flex-start}.existing-list .tag{margin-left:auto}
@media(max-width:900px){.builder-grid{grid-template-columns:1fr}.builder-primary{border-right:0;border-bottom:1px solid var(--line)}.summary-grid{grid-template-columns:1fr}.pack-grid{grid-template-columns:1fr}}

<body>
<header>
  <h1>Practice Studio</h1>
  <nav class="skins" id="skins"></nav>
  <span class="who"><strong>Dr. Osei</strong> · Meridian Family Practice · <a href="/api/audit/export">Audit &amp; exports</a></span>
</header>
<main id="main"></main>
<footer>Practice Studio learning environment · synthetic data only · every build, gate decision, and release is recorded.</footer>

<script>
"use strict";
// One state machine, three skins. The skins change chrome and ritual, never
// capability: all of them drive the same control-plane API.
const SKINS = {a:"Builder", b:"Release path", c:"Clinical view", d:"Architecture"};
const S = {
  skin: "a",
  packs: [],
  packSel: null,
  prompt: "",
  apps: [],
  appId: null,
  app: null,
  gate: null,          // {report, meter, reviewer_note}
  audit: [],
  operate: null,
  scaffold: [],        // animated generate steps
  generating: false,
  modal: null,         // "preflight" | "cosign" | null
  drawer: false,
  stage: "describe",   // 1b rail position
  review: null,        // reviewer note + report after /review
  err: null,
};

const $ = sel => document.querySelector(sel);
const esc = s => String(s ?? "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

async function api(path, opts) {
  const r = await fetch(path, opts && {method:"POST", headers:{"content-type":"application/json"}, body:JSON.stringify(opts)});
  const body = await r.json().catch(() => ({}));
  if (!r.ok) { S.err = body.error || r.statusText; render(); throw new Error(S.err); }
  S.err = null;
  return body;
}

async function loadHome() {
  const [p, a] = await Promise.all([api("/api/packs"), api("/api/apps")]);
  S.packs = p.packs; S.apps = a.apps;
  if (!S.packSel && S.packs.length) S.packSel = S.packs[0].id;
  render();
}

async function refreshApp() {
  if (!S.appId) return;
  const [app, gate, audit, operate] = await Promise.all([
    api(`/api/apps/${S.appId}`),
    api(`/api/apps/${S.appId}/gate`),
    api(`/api/apps/${S.appId}/audit`),
    api(`/api/apps/${S.appId}/operate`),
  ]);
  S.app = app; S.gate = gate; S.audit = audit.events; S.operate = operate;
  render();
}

// ---------- actions ----------

async function buildApp() {
  const prompt = $("#prompt") ? $("#prompt").value.trim() : S.prompt;
  if (!prompt || !S.packSel) return;
  const pack = S.packs.find(p => p.id === S.packSel);
  const name = prompt.length < 34 ? prompt : pack.name;
  const res = await api("/api/apps", {prompt, pack: S.packSel, name});
  S.appId = res.app.id; S.app = res.app;
  S.scaffold = res.scaffold.map(s => ({...s, shown:false}));
  S.generating = true; S.stage = "generate"; S.review = null;
  render();
  // Replay the scaffold steps so generate is watchable, like the storyboard.
  S.scaffold.forEach((step, i) => setTimeout(() => {
    step.shown = true;
    if (i === S.scaffold.length - 1) { S.generating = false; S.stage = "preview"; refreshApp(); }
    render();
  }, 420 * (i + 1)));
  await refreshApp();
}

async function iterate() {
  const box = $("#reply"); const instruction = box && box.value.trim();
  if (!instruction) return;
  await api(`/api/apps/${S.appId}/iterate`, {instruction});
  S.stage = "iterate";
  await refreshApp();
}

async function fixGate(id) { await api(`/api/apps/${S.appId}/gate/${id}/fix`, {}); await refreshApp(); }
async function restore(v) { await api(`/api/apps/${S.appId}/restore`, {version: v}); await refreshApp(); }
async function runReview() { S.review = await api(`/api/apps/${S.appId}/review`, {}); S.stage = "gate"; await refreshApp(); }

async function promote() {
  const cosigner = $("#cosign") ? $("#cosign").value.trim() : "Dr. A. Osei";
  const synthetic_demo = (S.gate && S.gate.report && S.gate.report.stubbed > 0);
  try {
    await api(`/api/apps/${S.appId}/promote`, {cosigner, synthetic_demo});
    S.modal = null; S.stage = "operate";
  } catch (e) { /* err already set; keep modal open so the lock is visible */ }
  await refreshApp();
}

async function rollback() { await api(`/api/apps/${S.appId}/rollback`, {}); S.stage = "deploy"; await refreshApp(); }

async function openApp(id) {
  S.appId = id; S.scaffold = []; S.generating = false; S.review = null;
  await refreshApp();
  S.stage = S.app.stage === "live" ? "operate" : "iterate";
  render();
}
function goHome() { S.appId = null; S.app = null; S.modal = null; loadHome(); }

// ---------- shared fragments ----------

const live = () => S.app && S.app.stage === "live";
const badge = () => live()
  ? S.app.allocation.pool === "synthetic-demo"
    ? `<span class="tag tb" style="margin-left:auto">SYNTHETIC DEMO · no tenant data</span>`
    : `<span class="tag tg" style="margin-left:auto">LIVE · ${esc(S.app.allocation.url)}</span>`
  : `<span class="tag ty" style="margin-left:auto">SANDBOX · synthetic data</span>`;

function meterHtml(withFix) {
  if (!S.gate) return "";
  if (live()) {
    // Preflight is a sandbox instrument; once live, the receipt is the
    // attestation pinned to the deploy, not a re-run of the checks.
    return `<b>Gate at release: ${esc(S.app.attestation.gate_summary)} ✓</b>
      <div class="sk track"><div class="fill" style="width:100%"></div></div>
      <div class="muted">co-signed ${esc(S.app.attestation.cosigner)} — attached to deploy v${S.app.allocation.app_version} in the audit record</div>`;
  }
  const r = S.gate.report;
  const rows = r.results.map(g => {
    const ok = g.status === "pass", stub = g.status === "stubbed";
    const fix = withFix && !ok && !stub && g.fixable ? `<span class="fixlink" onclick="fixGate('${g.id}')">fix</span>` : "";
    // A labeled stub satisfies the meter but is never drawn as a check (#3).
    return `<div class="gline ${ok || stub ? "pass" : "fail"}">${ok ? "✓" : stub ? "◐" : "○"} ${esc(g.title)}${stub ? ' <span class="muted">stubbed</span>' : ""}${fix}</div>`;
  }).join("");
  const done = r.passed + (r.stubbed || 0);
  return `<b>Compliance ${r.passed}/${r.total}${r.stubbed ? ` <span class="muted">+${r.stubbed} stubbed</span>` : ""}</b>
    <div class="sk track"><div class="fill" style="width:${r.total ? Math.max(4, 100*done/r.total) : 4}%"></div></div>
    ${rows}
    <div class="muted">${r.green ? (r.stubbed ? "build settled with a stub — synthetic demo available; production stays locked" : "all checks passed — production promotion unlocks below") : "checks fill in as you build — deploy unlocks at " + r.total + "/" + r.total}</div>`;
}

function versionChips() {
  if (!S.app) return "";
  return S.app.addenda.map(a =>
    `<span class="chip ${a.version === S.app.current_version ? "on" : ""}" onclick="restore(${a.version})" title="${esc(a.instruction)}">v${a.version}${a.version === S.app.current_version ? " ✓" : ""}</span>`
  ).join(" ");
}

function chatHtml() {
  const turns = S.app.addenda.map(a => `
    <div class="sk msg dr">"${esc(a.instruction)}"</div>
    <div>${esc(a.reply)}</div>`).join("");
  return `${turns}
    <div style="margin-top:auto" class="row">
      <input type="text" id="reply" placeholder="reply…" style="flex:1" onkeydown="if(event.key==='Enter')iterate()">
      <button class="b" onclick="iterate()">send</button>
    </div>`;
}

function previewHtml() {
  const feats = S.app.features.map(f => `<div class="sk feature">${esc(f)}</div>`).join("");
  return `<div class="ln" style="width:58%"></div>${feats}`;
}

function auditRows(limit) {
  const evs = [...S.audit].reverse().slice(0, limit || 8);
  return evs.map(e => {
    const t = new Date(e.at * 1000).toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
    // App-scoped view: sensitive values arrive as the doctor's own
    // plaintext (#8); the platform export keeps the hmac-sha256: form.
    const extra = e.sensitive ? Object.entries(e.sensitive).map(([k, v]) => ` · ${k}: “${v}”`).join("") : "";
    return `<div class="sk" style="padding:4px 9px;font-size:13px">${t} · ${esc(e.actor)} · ${esc(e.detail + extra)}</div>`;
  }).join("");
}

  const drawer = S.drawer ? `

        <input type="text" id="cosign" placeholder="co-sign: Dr. A. Osei" style="flex:1">

      </div>
      <span class="fixlink" style="margin-left:0" onclick="S.modal=null;render()">close</span>
    </div></div>`;
  })() : "";

  const operatePane = live() ? `
    <div class="row">
      <div class="sk" style="flex:1;padding:6px 10px">uptime <b>${S.operate.metrics.available ? `${S.operate.metrics.uptime_pct}%` : "unavailable"}</b></div>
      <div class="sk" style="flex:1;padding:6px 10px">p95 <b>${S.operate.metrics.available ? `${S.operate.metrics.p95_ms}ms` : "unavailable"}</b></div>
      <div class="sk" style="flex:1;padding:6px 10px">allocation <b>${esc(S.app.allocation.id)}</b></div>
    </div>
    <b style="font-family:'Shantell Sans',sans-serif;font-size:12px">Who touched what</b>
    ${auditRows(6)}
    <div class="row">
      <a class="b" style="font-size:12.5px" href="/api/apps/${S.appId}/export">export app (no hostage code)</a>
      <a class="b" style="font-size:12.5px" href="/api/audit/export">export audit log</a>
      <button class="b" style="font-size:12.5px" onclick="rollback()">rollback</button>
    </div>` : previewHtml();

  return `
  <div class="scr">
    <div class="bar"><span class="dot"></span>${esc(S.app.name)} ${badge()}
      <span style="display:flex;gap:4px;margin-left:10px">${versionChips()}</span>
    </div>
    <div class="split">
      <div class="left">${genPane}</div>
      <div class="right">${operatePane}${preflight}</div>
    </div>
    ${drawer}
    <div class="bar" style="border-top:1.4px solid #2b2b2b;border-bottom:none">
      <button class="b" onclick="goHome()">← apps</button>
      <button class="b" onclick="S.drawer=!S.drawer;render()">${S.drawer ? "⌃ hide" : "⌄ under the hood"}</button>
      ${live() ? "" : `<button class="b bp" style="margin-left:auto" onclick="S.modal='preflight';render()">Preflight & deploy</button>`}

      </div>
    </div>`;
  }

  return `
  <div class="scr">
    <div class="bar">${railHtml()}</div>
    <div style="display:flex;min-height:430px">

        <div class="sk" style="background:#faeedd;border-style:dashed"><b>SANDBOX POOL</b> — untrusted generated code<small>synthetic data only · <b>no route to prod databases</b> · docker → microVM later (driver swap, doctor never notices)</small></div>
        <div style="display:flex;align-items:center;color:#2a78d6"><b>—gate→</b></div>
        <div class="sk" style="background:#e2f0e7;border-style:dashed"><b>PROD POOL</b> — promoted apps only<small>only pool with tenant Postgres access · real PHI lives here, under BAA</small></div>
      </div>
    </div>
    <div class="mid">↓ Terraform-managed, Packer-imaged, immutable ↓</div>
    <div class="sk layer" style="background:#fdfdfb">
      <b style="font-family:'Shantell Sans',sans-serif;font-size:12.5px">INFRASTRUCTURE — DigitalOcean, under BAA</b>
      <div class="cells">
        <div class="sk">VPC per env</div>
        <div class="sk">Droplets (3 control + pools)</div>
        <div class="sk">managed Postgres · per-tenant db</div>
        <div class="sk">Spaces (encrypted uploads)</div>
        <div class="sk">Load Balancer (single ingress)</div>
      </div>
    </div>
    <div class="note" style="text-align:right">everything above the platform layer is swappable without the doctor noticing — that's the point</div>
  </div></div>`;
}

// ---------- render ----------

function render() {
  $("#skins").innerHTML = Object.entries(SKINS).map(([k, label]) =>
    `<button class="${S.skin === k ? "on" : ""}" onclick="S.skin='${k}';render()">${label}</button>`).join("");
  const view = {a: viewBuilder, b: viewPipeline, c: viewChart, d: viewArch}[S.skin];
  $("#main").innerHTML = errHtml() + view();
}

loadHome();
</script>
